<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication Forms</title>
  <link rel="stylesheet" href="assets/css/fbase.css">
</head>
<body>
  <div class="container">
    <!-- Sign In Section -->
    <div class="auth-section">
      <h1>Login</h1>
      <form id="signInForm">
        <div class="form-group">
          <input type="email" id="signInEmail" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="signInPassword" placeholder="Password" required>
        </div>
        <div class="form-group">
          <button type="submit" class="btn">Login</button>
        </div>
      </form>
    </div>

    <!-- Or Separator -->
    <div class="or-separator">OR</div>

    <!-- Register Link -->
    <div class="register-link">
      <p>Don't have an account yet? <a href="#" id="registerLink">Register here</a>.</p>
    </div>

    <!-- Sign Up Section (Initially Hidden) -->
    <div class="auth-section" id="signUpSection" style="display: none;">
      <h1>Create an Account</h1>
      <form id="signUpForm">
        <div class="form-group">
          <input type="email" id="signUpEmail" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="signUpPassword" placeholder="Password" required>
        </div>
        <div class="form-group">
          <button type="submit" class="btn">Register</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>

   <!-- Reference your custom form handling script -->
  <script src="assets/js/fbase.js"></script>

  <!-- JavaScript to toggle visibility -->
  <script>
    document.getElementById('registerLink').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('signUpSection').style.display = 'block';
      document.querySelector('.register-link').style.display = 'none';
    });
  </script>
</body>
</html>
